<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Leonne! 🎂 ✨</title>
    
    <link rel="stylesheet" href="../../../styles.css" />
    
    <style>
      body {
        background: linear-gradient(135deg, #fef3c7, #fde68a) !important; /* Soft golden warm aesthetic */
        overflow-x: hidden;
      }

      /* INTERACTIVE INTRO OVERLAY (To unlock background browser autoplay safely) */
      #cardOverlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(30, 41, 59, 0.98);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #fff;
        transition: opacity 0.5s ease;
      }
      #cardOverlay h2 {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        margin-bottom: 1rem;
        letter-spacing: 1px;
      }

      /* MAIN CARD CONTAINER */
      .birthday-envelope {
        max-width: 550px;
        margin: 4rem auto;
        padding: 3rem;
        background: white;
        border-radius: 30px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.08);
        text-align: center;
        position: relative;
      }

      /* INTERACTIVE CSS CANDLE SYSTEM */
      .cake-container {
        position: relative;
        width: 100%;
        margin: 2.5rem 0 1rem 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .candle {
        position: relative;
        width: 24px;
        height: 90px;
        background: linear-gradient(to right, #06b6d4, #22d3ee); /* Cyan candle profile */
        border-radius: 6px;
        box-shadow: inset -5px 0 rgba(0,0,0,0.1);
      }
      .candle::before {
        content: '';
        position: absolute;
        width: 100%; height: 100%;
        background: repeating-linear-gradient(45deg, transparent, transparent 10px, #fff 10px, #fff 20px);
        opacity: 0.25;
        border-radius: 6px;
      }
      .wick {
        position: absolute;
        top: -12px; left: 50%;
        transform: translateX(-50%);
        width: 3px; height: 12px;
        background: #3f3f46;
        border-radius: 2px;
      }
      .flame {
        position: absolute;
        top: -38px; left: 50%;
        transform: translateX(-50%);
        width: 20px; height: 32px;
        background: linear-gradient(to bottom, #f97316, #facc15);
        border-radius: 50% 50% 20% 20%;
        box-shadow: 0 0 20px rgba(234, 179, 8, 0.8), 0 0 40px rgba(249, 115, 22, 0.6);
        cursor: pointer;
        z-index: 100;
        animation: flicker 0.15s infinite alternate ease-in-out;
        transition: all 0.3s ease;
      }
      .flame:hover {
        transform: translateX(-50%) scale(1.15);
      }
      @keyframes flicker {
        0% { transform: translateX(-50%) scale(1) rotate(-1deg); }
        100% { transform: translateX(-50%) scale(1.08) rotate(2deg); }
      }
      
      .flame.blown-out {
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) translateY(-20px) scale(0);
      }
      .smoke-trail {
        position: absolute;
        top: -25px; left: 50%;
        transform: translateX(-50%);
        width: 4px; height: 20px;
        background: rgba(156, 163, 175, 0.4);
        border-radius: 50%;
        filter: blur(2px);
        opacity: 0;
        pointer-events: none;
      }
      .smoke-trail.rise {
        animation: smokeFade 2s forwards ease-out;
      }
      @keyframes smokeFade {
        0% { opacity: 0; transform: translateX(-50%) translateY(0) scaleX(1); }
        20% { opacity: 0.6; }
        100% { opacity: 0; transform: translateX(-20px) translateY(-40px) scaleX(3) scaleY(1.5); filter: blur(5px); }
      }

      .candle-notice {
        font-size: 0.85rem;
        color: var(--muted);
        margin-top: 0.75rem;
        font-style: italic;
        transition: opacity 0.5s ease;
      }

      /* BESPOKE PHOTO CONTAINER UPON ENTRY BEFORE THE LETTER */
      .birthday-photo-wrap {
        width: 100%;
        max-width: 450px;
        margin: 2rem auto;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--border);
        background: #f8fafc;
      }
      .birthday-photo-wrap img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
      }
    </style>
</head>
<body>

    <div id="cardOverlay">
      <span style="font-size: 4rem; margin-bottom: 1rem; animation: float 3s ease-in-out infinite;">🎁</span>
      <h2>For Leonne</h2>
      <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem; font-size: 0.95rem;">May natanggap kang espesyal na liham.</p>
      <button class="letter-button" id="openCardBtn" style="transform: scale(1.1);">Open Card 💌
