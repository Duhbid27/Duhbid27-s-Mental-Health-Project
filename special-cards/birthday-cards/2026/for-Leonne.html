<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Leonne!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f7ebe1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
            perspective: 1000px;
        }

        /* --- Stage 1: Birthday Cake --- */
        #cake-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .cake {
            position: relative;
            width: 180px;
            height: 120px;
            background: #f19fb3;
            border-radius: 10px 10px 0 0;
            box-shadow: inset 0 10px 0 #f4b2c1, 0 8px 0 #df8298;
            margin-top: 60px;
        }

        .cake::before {
            content: "";
            position: absolute;
            top: 30px;
            left: 0;
            width: 100%;
            height: 12px;
            background: #fff;
        }

        .cake::after {
            content: "";
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            height: 12px;
            background: #fff;
        }

        .candle {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 40px;
            background: linear-gradient(to right, #dee2e6, #f8f9fa);
            border-radius: 3px 3px 0 0;
        }

        .flame {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 20px;
            background: #ffbc42;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px #ffbc42;
            animation: flicker 0.6s infinite alternate;
            cursor: pointer;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1) skewX(2deg); }
        }

        .instructions {
            margin-top: 30px;
            font-size: 1.1rem;
            color: #6c757d;
            font-weight: 500;
            text-align: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* --- Stage 2 & 3: Card Setup --- */
        #card-stage {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .card-container {
            position: relative;
            width: 300px;
            height: 400px;
            transform-style: preserve-3d;
            transition: transform 1s ease;
        }

        /* Card States */
        .card-container.folded {
            transform: rotateX(10deg) rotateY(0deg);
        }

        .card-container.open {
            /* FIXED: Changed from px to deg so the browser can compute the 3D flip cleanly */
            transform: rotateX(10deg) rotateY(-180deg);
        }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            backface-visibility: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 25px;
            background-color: #fff;
            border: 1px solid #f0f0f0;
        }

        /* Front Cover */
        .card-front {
            background: linear-gradient(135deg, #ffafbd, #ffc3a0);
            color: white;
            z-index: 2;
            transform: rotateY(0deg);
            text-align: center;
        }

        .card-front h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Inside Right / Backing */
        .card-inside {
            background: #ffffff;
            transform: rotateY(180deg);
            z-index: 1;
            text-align: center;
            overflow: hidden;
        }

        /* Content layers inside the card */
        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
            background: #fff;
            border-radius: 12px;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }

        /* Image Display Styling */
        .drive-image {
            width: 100%;
            height: 85%;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .image-caption {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #888;
            font-style: italic;
        }

        /* Letter Styling */
        .letter-content {
            color: #4a4a4a;
            line-height: 1.6;
        }

        .letter-content h3 {
            color: #d96a7b;
            margin-bottom: 15px;
        }

        .letter-content p {
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .signature {
            font-family: 'Georgia', serif;
            font-style: italic;
            color: #d96a7b;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="cake-stage">
        <div class="cake">
            <div class="candle">
                <div class="flame" id="flame" onclick="blowCandle(event)"></div>
            </div>
        </div>
        <p class="instructions" id="cake-instruction">Click the flame to blow out the candle!</p>
    </div>

    <div id="card-stage">
        <div class="card-container folded" id="birthday-card">
            
            <div class="card-side card-front">
                <h2>For Leonne ✨</h2>
                <p>Tap anywhere to open</p>
            </div>

            <div class="card-side card-inside">
                
                <div class="content-layer" id="photo-layer">
                    <img class="drive-image" src="https://lh3.googleusercontent.com/d/1TzKTFR82E7-p4PCoJ9g6gb64wGLRaEzX" alt="Special Memory for Leonne">
                    <p class="image-caption">Tap anywhere to read my message...</p>
                </div>

                <div class="content-layer hidden" id="letter-layer">
                    <div class="letter-content">
                        <h3>Happy Birthday, Leonne!</h3>
                        <p>blah blah blah</p>
                        <div class="signature">Love lots, Hoie</div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        let currentStep = 0;

        const cakeStage = document.getElementById('cake-stage');
        const cardStage = document.getElementById('card-stage');
        const card = document.getElementById('birthday-card');
        const photoLayer = document.getElementById('photo-layer');
        const letterLayer = document.getElementById('letter-layer');

        // Step 1: Blow out candle
        window.blowCandle = function(event) {
            event.stopPropagation(); // Prevents global body click from firing during the cake sequence
            
            document.getElementById('flame').style.display = 'none';
            document.getElementById('cake-instruction').innerText = "Make a wish!";
            
            setTimeout(() => {
                cakeStage.style.opacity = '0';
                setTimeout(() => {
                    cakeStage.style.display = 'none';
                    cardStage.style.display = 'block';
                    
                    setTimeout(() => {
                        cardStage.style.opacity = '1';
                        currentStep = 1; // Unlocks the global click trigger safely
                    }, 50);
                }, 800);
            }, 1000);
        }

        // Global click handler to progress stages 2, 3, and 4
        document.body.addEventListener('click', () => {
            if (currentStep === 1) {
                // Step 2 -> Step 3: Flip card open to reveal image layer
                card.classList.remove('folded');
                card.classList.add('open');
                currentStep = 2;
            } else if (currentStep === 2) {
                // Step 3 -> Step 4: Hide image layout layer and crossfade into the letter text
                photoLayer.classList.add('hidden');
                letterLayer.classList.remove('hidden');
                currentStep = 3;
            }
        });
    </script>
</body>
</html>
