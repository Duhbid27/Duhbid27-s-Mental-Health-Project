<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Greeting Card | Hoie’s Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Quick dynamic background classes matching your themes */
      body.theme-sunset { background: linear-gradient(135deg, #fef08a, #f97316, #701a75) !important; color: #fff; }
      body.theme-starry { background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042) !important; color: #fff; }
      body.theme-cloudy { background: linear-gradient(135deg, #e0f2fe, #bae6fd, #7dd3fc) !important; }
      
      .envelope-container { max-width: 600px; margin: 4rem auto; padding: 2rem; }
      .card-view-panel { background: rgba(255, 255, 255, 0.95); color: #1e293b; border-radius: 30px; padding: 3rem; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
      [data-theme="dark"] .card-view-panel { background: rgba(30, 41, 59, 0.95); color: #f8fafc; }
      .card-message-text { font-size: 1.1rem; line-height: 1.8; margin: 2rem 0; white-space: pre-wrap; }
    </style>
</head>
<body class="theme-cloudy"> <main class="envelope-container">
      <article class="card-view-panel" id="errorPanel" style="display: none; text-align: center;">
        <h2>⚠️ Invalid Card Link</h2>
        <p style="margin-top: 1rem;">Mukhang naputol o may kulang sa link na ginamit mo. Paki-check uli ang pagkaka-copy.</p>
        <a href="digital-letters.html" class="letter-button" style="display:inline-block; margin-top:1.5rem; text-decoration:none;">Bumalik sa Dashboard</a>
      </article>

      <article class="card-view-panel" id="cardDisplayPanel">
        <div style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 700;" id="themeLabel">
          🔒 Private Message
        </div>
        
        <div class="card-message-content">
          <h1 style="font-family: 'Playfair Display', serif; margin-top: 1rem;" id="viewRecipient">Dear...</h1>
          
          <div class="card-message-text" id="viewMessage">
            Binabasa at dine-decode pa ang iyong lihim na mensahe...
          </div>
          
          <p style="text-align: right; font-weight: 600; font-size: 1.1rem;" id="viewAuthor">
            From, <br><span style="font-weight: 400; font-style: italic;">Anonymous</span>
          </p>
        </div>
      </article>
    </main>

    <script type="module" src="view-card.js"></script>
</body>
</html>
